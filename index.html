
  <!DOCTYPE html>
  <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>CumpliSent</title>
      <link rel="icon" type="image/png" href="%BASE_URL%icons/cumplisent-fast.png" />
      <link rel="preload" as="image" href="%BASE_URL%icons/cumplisent-fast.png" fetchpriority="high" />
      <style>
        html, body { height: 100%; margin: 0; }
        #root { height: 100%; }
        #legacy-boot-loader {
          position: fixed;
          inset: 0;
          z-index: 2147483647;
          display: flex;
          align-items: center;
          justify-content: center;
          overflow: hidden;
          background: #ffffff;
          transition: opacity 220ms ease, visibility 220ms ease;
        }
        #legacy-boot-loader.legacy-boot-loader--hidden {
          opacity: 0;
          visibility: hidden;
          pointer-events: none;
        }
        .legacy-boot-bounce-wrap {
          position: fixed;
          inset: 0;
          pointer-events: none;
          overflow: hidden;
          z-index: 0;
        }
        .legacy-boot-bounce-x,
        .legacy-boot-bounce-y {
          position: absolute;
          width: 100%;
          height: 100%;
        }
        .legacy-boot-bounce-x { animation: legacy-boot-x 7s linear infinite alternate; }
        .legacy-boot-bounce-y { animation: legacy-boot-y 5s linear infinite alternate; }
        .legacy-boot-bounce-x:nth-child(2) { animation-duration: 8.5s; animation-delay: -2s; }
        .legacy-boot-bounce-x:nth-child(2) .legacy-boot-bounce-y { animation-duration: 6s; animation-delay: -1s; }
        .legacy-boot-bounce-x:nth-child(3) { animation-duration: 6.5s; animation-delay: -4s; }
        .legacy-boot-bounce-x:nth-child(3) .legacy-boot-bounce-y { animation-duration: 7s; animation-delay: -3s; }
        .legacy-boot-bounce-x:nth-child(4) { animation-duration: 9s; animation-delay: -5s; }
        .legacy-boot-bounce-x:nth-child(4) .legacy-boot-bounce-y { animation-duration: 5.5s; animation-delay: -4s; }
        .legacy-boot-bounce-logo {
          width: 150px;
          height: 150px;
          object-fit: contain;
          opacity: 0.16;
          filter: drop-shadow(0 18px 32px rgba(12, 35, 64, 0.18));
        }
        .legacy-boot-card {
          position: relative;
          z-index: 1;
          width: min(700px, calc(100vw - 48px));
          min-height: min(500px, calc(100vh - 48px));
          padding: 3.25rem 2rem;
          border-radius: 1.75rem;
          background: rgba(30, 48, 75, 0.86);
          -webkit-backdrop-filter: blur(9px) saturate(82%);
          backdrop-filter: blur(9px) saturate(82%);
          box-shadow: 0 30px 76px -30px rgba(15, 23, 42, 0.48);
          text-align: center;
          font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        .legacy-boot-logo {
          width: 118px;
          height: 118px;
          object-fit: contain;
          margin: 0 auto 2.5rem;
          filter: drop-shadow(0 18px 34px rgba(8, 22, 42, 0.28));
        }
        .legacy-boot-spinner {
          width: 92px;
          height: 92px;
          margin: 0 auto 2.1rem;
          border: 10px solid rgba(96, 165, 250, 0.22);
          border-top-color: #60a5fa;
          border-right-color: #60a5fa;
          border-radius: 9999px;
          animation: legacy-boot-spin 1s linear infinite;
        }
        .legacy-boot-title {
          margin: 0;
          color: #ffffff;
          font-size: 3rem;
          font-weight: 900;
          line-height: 1;
          letter-spacing: 0;
        }
        .legacy-boot-title span { color: #0066ff; }
        .legacy-boot-text {
          margin: 1.15rem 0 0;
          color: #aeb9c9;
          font-size: 1.05rem;
          font-weight: 700;
        }
        @media (max-width: 700px) {
          .legacy-boot-card {
            min-height: min(460px, calc(100vh - 48px));
            padding: 2.5rem 1.5rem;
            border-radius: 1.5rem;
          }
          .legacy-boot-logo {
            width: 96px;
            height: 96px;
            margin-bottom: 2rem;
          }
          .legacy-boot-spinner {
            width: 76px;
            height: 76px;
            border-width: 8px;
            margin-bottom: 1.8rem;
          }
          .legacy-boot-title {
            font-size: 2.45rem;
          }
          .legacy-boot-text {
            font-size: 1rem;
          }
        }
        @keyframes legacy-boot-spin { to { transform: rotate(360deg); } }
        @keyframes legacy-boot-x {
          from { transform: translateX(28px); }
          to { transform: translateX(calc(100vw - 178px)); }
        }
        @keyframes legacy-boot-y {
          from { transform: translateY(30px); }
          to { transform: translateY(calc(100vh - 180px)); }
        }
      </style>
    </head>

    <body>
      <div id="legacy-boot-loader" aria-label="Cargando CumpliSent">
        <div class="legacy-boot-bounce-wrap" aria-hidden="true">
          <div class="legacy-boot-bounce-x"><div class="legacy-boot-bounce-y"><img src="%BASE_URL%icons/cumplisent-fast.png" class="legacy-boot-bounce-logo" alt="" /></div></div>
          <div class="legacy-boot-bounce-x"><div class="legacy-boot-bounce-y"><img src="%BASE_URL%icons/cumplisent-fast.png" class="legacy-boot-bounce-logo" alt="" /></div></div>
          <div class="legacy-boot-bounce-x"><div class="legacy-boot-bounce-y"><img src="%BASE_URL%icons/cumplisent-fast.png" class="legacy-boot-bounce-logo" alt="" /></div></div>
          <div class="legacy-boot-bounce-x"><div class="legacy-boot-bounce-y"><img src="%BASE_URL%icons/cumplisent-fast.png" class="legacy-boot-bounce-logo" alt="" /></div></div>
        </div>
        <div class="legacy-boot-card">
          <img src="%BASE_URL%icons/cumplisent-fast.png" class="legacy-boot-logo" alt="CumpliSent" />
          <div class="legacy-boot-spinner"></div>
          <h1 class="legacy-boot-title">Cumpli<span>Sent</span></h1>
          <p class="legacy-boot-text">Verificando licencia...</p>
        </div>
      </div>
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
    </body>
  </html>
